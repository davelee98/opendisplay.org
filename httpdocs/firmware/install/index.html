<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="favicon.ico"> 
  <link rel="stylesheet" href="https://opendisplay.org/common.css">
	<title>OpenDisplay Web Installer</title>
  <script>
    // Redirect to toolbox while preserving URL parameters
    (function() {
      const currentUrl = new URL(window.location);
      const toolboxUrl = new URL('../toolbox/index.html', window.location);
      
      // Copy all search parameters to the toolbox URL
      currentUrl.searchParams.forEach((value, key) => {
        toolboxUrl.searchParams.set(key, value);
      });
      
      // Redirect to toolbox
      window.location.replace(toolboxUrl.toString());
    })();
  </script>
</head>
<body>
</body>
</html>
