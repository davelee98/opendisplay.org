            description: Encryption disabled, all commands work without authentication
          1:
            name: enabled
            description: Encryption enabled, authentication required for sensitive commands
      - name: encryption_key
        size: 16
        description: AES-128 master encryption key (16 bytes). If all zeros, encryption is disabled regardless of encryption_enabled flag
      - name: session_timeout_seconds
        size: 2
