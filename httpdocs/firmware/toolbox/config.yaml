    40:
      name: touch_controller
      required: false
      repeatable: true
      description: Capacitive touch controller on I2C (e.g. GT911). Publishes the first contact into dynamicreturndata (5 bytes), same BLE manufacturer data path as buttons. Byte0 low nibble 1–5 = finger down count; 6 = released (last x/y retained in bytes 1–4); 0 with zeros = never touched.
      fields:
      - name: instance_number
        size: 1
        description: Unique index for multiple touch blocks (0-based)
      - name: touch_ic_type
        size: 2
        description: Touch controller IC enum
        enum:
          0:
            name: none
            description: Disabled
          1:
            name: gt911
            description: Goodix GT911 (I2C)
      - name: bus_id
        size: 1
        description: data_bus instance for I2C (0–3). Use 0xFF to mean bus 0. On boards with separate sensor/touch buses (e.g. reTerminal Sticky MISC=0, TP=1), point touch at the TP bus index.
      - name: i2c_addr_7bit
        size: 1
        description: I2C 7-bit address (GT911 0x5D or 0x14). 0 or 0xFF = auto-detect after reset
      - name: int_pin
        size: 1
        description: Interrupt GPIO (active low), 0xFF = poll only
      - name: rst_pin
        size: 1
        description: Reset GPIO, 0xFF = skip reset (probe only)
      - name: display_instance
        size: 1
        description: Display config index for coordinate clip / invert reference (0-based)
      - name: flags
        size: 1
        description: Mapping flags (bitfield)
        bits:
          0:
            name: invert_x
            description: Invert X using panel width
          1:
            name: invert_y
            description: Invert Y using panel height
          2:
            name: swap_xy
            description: Swap X and Y before invert/clip
          3:
            name: reserved_3
          4:
            name: reserved_4
          5:
            name: reserved_5
          6:
            name: reserved_6
          7:
            name: reserved_7
      - name: poll_interval_ms
        size: 1
        description: Minimum time between polls (0 = default 25 ms)
      - name: touch_data_start_byte
        size: 1
        description: Start index in dynamicreturndata for 5-byte touch block (0–6; avoid overlap with binary_inputs). Encoding see touch_controller description (nibble 6 = release).
      - name: enable_pin
        size: 1
        description: Optional touch panel power enable GPIO (active high); 0 or 0xFF = unused
      - name: reserved
        size: 20
        description: Reserved for future config (e.g. GT911 register profile)
    41:
      name: passive_buzzer
      required: false
      repeatable: true
      description: Passive piezo buzzer (PWM). Frequency in activate command is 8-bit index; 0 = silence/rest, 1–255 = low..high tone range. Command 0x0075 payload after instance byte is outer_repeats, pattern_count, then per pattern n_steps and n_steps × (freq_u8, duration_u8). Duration units are fixed by firmware.
      fields:
      - name: instance_number
        size: 1
        description: Unique index (0-based)
      - name: drive_pin
        size: 1
        description: GPIO for PWM / square wave to buzzer (via transistor)
      - name: enable_pin
        size: 1
        description: Optional enable (e.g. FET); 0xFF = unused
      - name: flags
        size: 1
        description: Bit 0 = enable pin active high (else active low)
        bits:
          0:
            name: enable_active_high
            description: Enable pin is active high when set; otherwise active low
          1:
            name: reserved_1
          2:
            name: reserved_2
          3:
            name: reserved_3
          4:
            name: reserved_4
          5:
            name: reserved_5
          6:
            name: reserved_6
          7:
            name: reserved_7
      - name: duty_percent
        size: 1
        description: PWM duty 1–100; 0 = default 50
      - name: reserved
        size: 27
        description: Reserved bytes for future use (includes internal frequency/time scaling fields)
    42:
      name: nfc_config
      required: false
      repeatable: true
