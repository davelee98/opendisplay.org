    4:
      name: power_option
      required: true
      description: Power supply and sleep related options
      fields:
      - name: power_mode
        size: 1
        description: Power source type enum
        enum:
          1:
            name: battery
            description: battery powered
          2:
            name: usb
            description: usb powered
          3:
