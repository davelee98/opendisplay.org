            description: Allow unauthenticated config writes when encryption is enabled
          1:
            name: show_key_on_screen
            description: Show encryption key on screen (future feature)
          2:
            name: reset_pin_enabled
            description: Reset pin enabled (must be set for reset pin to work)
          3:
            name: reset_pin_polarity
            description: Reset pin polarity (0 = LOW triggers reset, 1 = HIGH triggers reset)
          4:
            name: reset_pin_pullup
            description: Enable pullup on reset pin
          5:
            name: reset_pin_pulldown
            description: Enable pulldown on reset pin
