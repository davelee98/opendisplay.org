          6:
            name: reserved_6
          7:
            name: reserved_7
      - name: capacity_estimator
        size: 1
        description: Battery chemistry estimator enum
        enum:
          1:
            name: li_ion
            description: 1s li-ion
          2:
            name: lifepo4
            description: 1s lifepo4
          3:
            name: supercap
            description: 2s supercapacitor with maxium charge voltage of 4.5V and cutoff at 3.6V
          4:
            name: lithium_primary
            description: Lithium primary battery
      - name: voltage_scaling_factor
        size: 2
        description: Voltage scaling / divider factor (implementation-specific)
      - name: deep_sleep_current_ua
        size: 4
        description: Deep sleep current of the board in microamperes (excl. MCU consumption), 0 if unknown
      - name: deep_sleep_time_seconds
        size: 2
        description: Deepsleep time in seconds(esp only, only on battery, 0 to disable)
      - name: charge_enable_pin
        size: 1
        description: BQ25616 charge enable GPIO (0 or 0xFF = unused; reTerminal Sticky EN_BAT_CHGn = GPIO39)
      - name: charge_state_pin
        size: 1
        description: BQ25616 charge-state input (0 or 0xFF = unused; Sticky CHARGE_STATE = GPIO40)
      - name: charger_flags
        size: 1
        description: Bit 0 = charge enable active low (/CE); bit 1 = charge-state active low (BQ25616 STAT, charging when LOW)
        bits:
          0:
            name: charge_enable_active_low
          1:
            name: charge_state_active_low
          2:
            name: reserved_2
          3:
            name: reserved_3
          4:
            name: reserved_4
          5:
            name: reserved_5
          6:
            name: reserved_6
          7:
            name: reserved_7
